<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NOTESTACK</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <div class="app">

        <aside class="sidebar">
            <div>
                <h2>📝 NoteStack</h2>
                <ul>
                    <li class="active" id="navNotes">📝 All Notes</li>
                    <li id="navImportant">🔴 Important</li>
                    <li id="navWork">🟡 Work</li>
                    <li id="navPersonal">🔵 Personal</li>
                    <li id="navIdeas">🟢 Ideas</li>
                    <li id="navChecklists">☑️ Checklists</li>
                    <li id="navTrash">🗑️ Trash</li>
                </ul>
                <div class="custom-folders-section">
                    <ul id="customFoldersList">
                        </ul>
                    <button id="newFolderBtn" class="sidebar-btn">➕ New Folder</button>
                </div>
            </div>
            <button id="darkModeBtn">🌙 Dark Mode</button>
        </aside>

        <main class="main">

            <header class="topbar">
                <input type="text" id="searchInput" placeholder="Search notes...">
            </header>

            <div id="notesView">
                <section class="create-note">
                    <div id="editorContainer">
                        <textarea id="noteInput" placeholder="Take a note..."></textarea>
                        <div id="checklistInputContainer" style="display: none;">
                            <div id="checklistItems">
                                </div>
                            <button id="addChecklistItemBtn" class="secondary-btn">+ Add Item</button>
                        </div>
                    </div>

                    <div class="mode-selector">
                        <button id="textModeBtn" class="mode-btn active">📄 Text</button>
                        <button id="checklistModeBtn" class="mode-btn">☑️ Checklist</button>
                    </div>

                    <div class="label-selector">
                        <span class="label-title">Labels:</span>
                        <div class="label-options">
                            <label class="label-option">
                                <input type="checkbox" class="label-checkbox" value="Important">
                                <span class="label-dot important"></span> Important
                            </label>
                            <label class="label-option">
                                <input type="checkbox" class="label-checkbox" value="Work">
                                <span class="label-dot work"></span> Work
                            </label>
                            <label class="label-option">
                                <input type="checkbox" class="label-checkbox" value="Personal">
                                <span class="label-dot personal"></span> Personal
                            </label>
                            <label class="label-option">
                                <input type="checkbox" class="label-checkbox" value="Ideas">
                                <span class="label-dot ideas"></span> Ideas
                            </label>
                        </div>
                    </div>

                    <div class="folder-selector">
                        <select id="folderSelect">
                            <option value="">No Folder</option>
                            </select>
                    </div>
                    <button id="addNoteBtn">Add Note</button>
                </section>
                <section id="notesGrid" class="notes-grid"></section>
            </div>

            <div id="trashView" style="display:none;">
                <section id="trashGrid" class="notes-grid"></section>
            </div>

        </main>

    </div>

    <div id="newFolderModal" class="modal" style="display:none;">
        <div class="modal-content">
            <span class="close-button" id="closeFolderModal">&times;</span>
            <h2>Create Folder</h2>
            <input type="text" id="folderNameInput" placeholder="Folder Name (e.g., College, Work)">
            <button id="createFolderBtn">Create</button>
        </div>
    </div>

    <script src="script.js"></script>
</body>

</html>
