<!DOCTYPE html>
<html>
<head>
    <title>Login - NoteStack</title>
    <style>
        body{
            font-family: Arial;
            display:flex;
            justify-content:center;
            align-items:center;
            height:100vh;
            background:#111;
            color:white;
        }
        .box{
            background:#1e1e1e;
            padding:30px;
            border-radius:10px;
            width:300px;
            text-align:center;
        }
        input{
            width:100%;
            padding:8px;
            margin:8px 0;
            border-radius:5px;
            border:none;
        }
        button{
            width:100%;
            padding:8px;
            margin-top:10px;
            border:none;
            border-radius:5px;
            cursor:pointer;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>NoteStack Login</h2>
    <input id="username" placeholder="Username">
    <input id="password" type="password" placeholder="Password">
    <button onclick="login()">Login</button>
    <button onclick="register()">Register</button>
</div>

<script>
let users = JSON.parse(localStorage.getItem("notestackUsers")) || [];

function register(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    if(!username || !password) return alert("Fill all fields");

    if(users.find(u => u.username === username)){
        return alert("User already exists");
    }

    users.push({ username, password });
    localStorage.setItem("notestackUsers", JSON.stringify(users));
    alert("Registered successfully! Now login.");
}

function login(){
    const username = document.getElementById("username").value.trim();
    const password = document.getElementById("password").value.trim();

    const user = users.find(u => u.username === username && u.password === password);

    if(!user) return alert("Invalid credentials");

    localStorage.setItem("notestackCurrentUser", JSON.stringify(user));
    window.location.href = "index.html";
}
</script>

</body>
</html>
